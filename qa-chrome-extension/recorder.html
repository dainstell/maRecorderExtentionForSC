<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Recorder</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      header {
        position: sticky;
        top: 0;
        background: white;
        border-bottom: 1px solid #e5e7eb;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        z-index: 10;
      }
      h1 {
        margin: 0;
        font-size: 14px;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        appearance: none;
        border: 1px solid #d1d5db;
        background: white;
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
      }
      button.primary {
        background: #111827;
        color: white;
        border-color: #111827;
      }
      button.danger {
        color: #991b1b;
        border-color: #fecaca;
        background: #fff1f2;
      }
      main {
        padding: 16px;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 12px;
      }
      .list {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        overflow: hidden;
      }
      .item {
        padding: 12px 12px;
        border-bottom: 1px solid #f3f4f6;
      }
      .item:last-child {
        border-bottom: 0;
      }
      .title {
        font-size: 13px;
        font-weight: 700;
      }
      .meta {
        margin-top: 6px;
        font-size: 12px;
        color: #6b7280;
        word-break: break-word;
      }
      textarea {
        width: 100%;
        height: 220px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 12px;
        margin-top: 12px;
        resize: vertical;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>QA Recorder</h1>
      <div class="actions">
        <button id="refresh">Refresh</button>
        <button id="start" class="primary">Start</button>
        <button id="stop">Stop</button>
        <button id="save">Save Test Case</button>
        <button id="clear" class="danger">Clear</button>
        <button id="exportJson" class="primary">Export JSON</button>
        <button id="exportCypress">Export Cypress</button>
        <button id="exportCsv">Export CSV (Tuskr)</button>
      </div>
    </header>

    <main>
      <div class="hint">This page stays open while you interact with other tabs/windows. Refresh if needed.</div>
      <div class="list" id="list"></div>
      <textarea id="exportArea" class="hidden" readonly></textarea>
    </main>

    <script src="recorder.js"></script>
  </body>
</html>
