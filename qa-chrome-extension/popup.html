<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Recorder</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        width: 420px;
      }
      header {
        padding: 12px 12px 8px;
        border-bottom: 1px solid #e5e7eb;
      }
      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
      }
      .sub {
        margin-top: 4px;
        font-size: 12px;
        color: #6b7280;
      }
      .wrap {
        padding: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        appearance: none;
        border: 1px solid #d1d5db;
        background: white;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
      }
      button.primary {
        background: #111827;
        color: white;
        border-color: #111827;
      }
      button.danger {
        color: #991b1b;
        border-color: #fecaca;
        background: #fff1f2;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .list {
        margin-top: 12px;
        max-height: 420px;
        overflow: auto;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
      }
      .item {
        padding: 10px;
        border-bottom: 1px solid #f3f4f6;
      }
      .item:last-child {
        border-bottom: 0;
      }
      .title {
        font-size: 12px;
        font-weight: 600;
        color: #111827;
      }
      .meta {
        margin-top: 6px;
        font-size: 11px;
        color: #6b7280;
        word-break: break-word;
      }
      .item-actions {
        margin-top: 8px;
        display: flex;
        gap: 6px;
      }
      .item-actions button {
        padding: 6px 8px;
      }
      textarea {
        width: 100%;
        height: 140px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 10px;
        margin-top: 12px;
        resize: vertical;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>QA Interaction Recorder</h1>
      <div class="sub">Interactions are recorded automatically on pages you visit.</div>
    </header>

    <div class="wrap">
      <div class="row">
        <button id="refresh">Refresh</button>
        <button id="openRecorder">Open Recorder</button>
        <button id="start" class="primary">Start</button>
        <button id="stop">Stop</button>
        <button id="save">Save Test Case</button>
        <button id="clear" class="danger">Clear</button>
        <button id="exportJson" class="primary">Export JSON</button>
        <button id="exportCypress">Export Cypress</button>
        <button id="exportCsv">Export CSV (Tuskr)</button>
      </div>

      <div class="list" id="list"></div>

      <div class="list" id="history" style="margin-top: 12px;"></div>

      <textarea id="exportArea" class="hidden" readonly></textarea>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
